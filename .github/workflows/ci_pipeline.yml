name: FC TECH Data Pipeline CI

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout del código
        uses: actions/checkout@v4

      - name: Configurar entorno Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Instalar dependencias
        run: |
          python -m pip install --upgrade pip
          pip install flake8 requests beautifulsoup4 playwright pandas mysql-connector-python
          python -m playwright install --with-deps chromium

      - name: Análisis de código estático (Linting con Flake8)
        run: |
          # Detiene la construcción si hay errores de sintaxis o variables no definidas
          flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics \
            --exclude=.github,.venv,venv,__pycache__
          # Las advertencias de formato se muestran pero no fallan el build
          flake8 . --count --exit-zero --max-complexity=10 --max-line-length=127 --statistics \
            --exclude=.github,.venv,venv,__pycache__

      - name: Verificación de Integridad de Scripts
        run: |
          echo "Validando compilación de scripts..."
          python -m py_compile conexion_db.py insertar_datos.py etl.py web_scrapper.py
          echo "Integración Continua completada exitosamente."

      - name: Validar estructura de datos.json
        run: |
          python - <<'EOF'
          import json
          import sys

          with open("datos.json", encoding="utf-8") as archivo:
              datos = json.load(archivo)

          for clave in ("productos", "clientes", "ventas"):
              if clave not in datos or not isinstance(datos[clave], list):
                  print(f"Error: 'datos.json' debe incluir la lista '{clave}'")
                  sys.exit(1)

          print("datos.json válido")
          EOF
