name: FC TECH Data Pipeline CI

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout del código
      uses: actions/checkout@v3

    - name: Configurar entorno Python 3.10
      uses: actions/setup-python@v4
      with:
        python-version: "3.10"

    - name: Instalar dependencias
      run: |
        python -m pip install --upgrade pip
        pip install flake8 requests beautifulsoup4 playwright pandas mysql-connector-python
        playwright install chromium

    - name: Análisis de código estático (Linting con Flake8)
      run: |
        # Detiene la construcción si hay errores de sintaxis o variables no definidas
        flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics
        # Las advertencias de formato se muestran pero no fallan el build
        flake8 . --count --exit-zero --max-complexity=10 --max-line-length=127 --statistics

    - name: Verificación de Integridad de Scripts
      run: |
        echo "Validando compilación de scripts..."
        python -m py_compile conexion_db.py
        python -m py_compile insertar_datos.py
        echo "✅ Integración Continua completada exitosamente."